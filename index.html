<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI旅程作成くん</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg space-y-4">
        <h1 class="text-xl font-bold text-blue-600 text-center">AI旅程作成くん</h1>
        
        <input type="password" id="apiKey" placeholder="Gemini APIキーを貼り付け" class="w-full p-2 border rounded">
        <input type="text" id="destination" placeholder="目的地（例：仙台）" class="w-full p-2 border rounded">
        
        <button onclick="generate()" id="btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
            旅程を作成する
        </button>

        <div id="out" class="mt-4 p-4 bg-gray-100 rounded hidden whitespace-pre-wrap text-sm"></div>
    </div>

    <script>
        async function generate() {
            const key = document.getElementById('apiKey').value.trim();
            const dest = document.getElementById('destination').value;
            const btn = document.getElementById('btn');
            const out = document.getElementById('out');

            if(!key || !dest) return alert("入力してください");

            btn.innerText = "作成中...";
            btn.disabled = true;

            try {
                // 2026年最新：モデル名をあえて「gemini-1.5-flash」のみに絞り、v1で叩く
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: dest + "の1泊2日旅行プランを詳しく作って" }] }] })
                });

                const data = await res.json();
                if(!res.ok) throw new Error(data.error.message);

                out.innerText = data.candidates[0].content.parts[0].text;
                out.classList.remove('hidden');
            } catch (e) {
                alert("エラー：" + e.message);
            } finally {
                btn.innerText = "旅程を作成する";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
